<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Medico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <h1 class="h3 mb-4" th:text="${medico.id > 0 ? 'Editar medico' : 'Agregar medico'}">Agregar medico</h1>
                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                    <form th:action="${medico.id > 0} ? @{/medicos/actualizar} : @{/medicos/guardar}" th:object="${medico}" method="post">
                        <input type="hidden" name="id" th:value="${medico.id}">

                        <div class="mb-3">
                            <label for="dni" class="form-label">DNI</label>
                            <input type="text" class="form-control" id="dni" name="dni" th:value="${medico.dni}" th:readonly="${medico.id > 0}" th:disabled="${medico.id > 0}" required>
                            <div th:if="${medico.id > 0}" class="form-text">El DNI no se puede modificar una vez creado el medico.</div>
                        </div>

                        <div class="mb-3">
                            <label for="nombre" class="form-label">Nombre</label>
                            <input type="text" class="form-control" id="nombre" name="nombre" th:value="${medico.nombre}" required>
                        </div>

                        <div class="mb-3">
                            <label for="apellido1" class="form-label">Primer apellido</label>
                            <input type="text" class="form-control" id="apellido1" name="apellido1" th:value="${medico.apellido1}" required>
                        </div>

                        <div class="mb-3">
                            <label for="apellido2" class="form-label">Segundo apellido</label>
                            <input type="text" class="form-control" id="apellido2" name="apellido2" th:value="${medico.apellido2}">
                        </div>

                        <div class="mb-3">
                            <label for="genero" class="form-label">Genero</label>
                            <select class="form-select" id="genero" name="genero" th:disabled="${medico.id > 0}" required>
                                <option value="">Seleccione...</option>
                                <option value="Masculino" th:selected="${medico.genero == 'Masculino'}">Masculino</option>
                                <option value="Femenino" th:selected="${medico.genero == 'Femenino'}">Femenino</option>
                            </select>
                            <div th:if="${medico.id > 0}" class="form-text">El genero queda fijado en el alta del medico.</div>
                        </div>

                        <div class="mb-3">
                            <label for="telefono" class="form-label">Telefono</label>
                            <input type="number" class="form-control" id="telefono" name="telefono" th:value="${medico.telefono}" required>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label">Correo electronico</label>
                            <input type="email" class="form-control" id="email" name="email" th:value="${medico.email}" required>
                        </div>

                        <div class="mb-4">
                            <label for="especialidadId" class="form-label">Especialidad</label>
                            <select class="form-select" id="especialidadId" th:field="*{especialidad.id}" required>
                                <option value="">Seleccione...</option>
                                <option th:each="especialidad : ${especialidades}"
                                        th:value="${especialidad.id}"
                                        th:text="${especialidad.nombre}">
                                </option>
                            </select>
                            <div class="form-text">
                                Si no existe la especialidad, puedes crearla en
                                <a th:href="@{/especialidades/nuevo}">Nueva especialidad</a>.
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="numeroColegiado" class="form-label">Numero de colegiado</label>
                            <input type="text" class="form-control" id="numeroColegiado" name="numeroColegiado" th:value="${medico.numeroColegiado}" required>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary" th:text="${medico.id > 0 ? 'Actualizar' : 'Guardar'}">Guardar</button>
                            <a th:href="@{/medicos}" class="btn btn-secondary">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
