<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pacientes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="h3 mb-1">Pacientes</h1>
            <p class="text-secondary mb-0">Listado general de pacientes registrados.</p>
        </div>
        <a th:href="@{/pacientes/nuevo}" class="btn btn-primary">Nuevo paciente</a>
    </div>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="card shadow-sm border-0">
        <div class="card-body">
            <div th:if="${#lists.isEmpty(pacientes)}" class="alert alert-info mb-0">
                No hay pacientes registrados todavia.
            </div>

            <div th:unless="${#lists.isEmpty(pacientes)}" class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>DNI</th>
                        <th>Nombre</th>
                        <th>Telefono</th>
                        <th>Email</th>
                        <th class="text-end">Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="paciente : ${pacientes}">
                        <td th:text="${paciente.id}">1</td>
                        <td th:text="${paciente.dni}">00000000A</td>
                        <td th:text="${paciente.nombre + ' ' + paciente.apellido1 + (#strings.isEmpty(paciente.apellido2) ? '' : ' ' + paciente.apellido2)}">Nombre Apellidos</td>
                        <td th:text="${paciente.telefono}">600000000</td>
                        <td th:text="${paciente.email}">correo@ejemplo.com</td>
                        <td class="text-end">
                            <a th:href="@{/pacientes/editar/{id}(id=${paciente.id})}" class="btn btn-sm btn-outline-primary">
                                Editar
                            </a>
                            <form th:action="@{/pacientes/eliminar/{id}(id=${paciente.id})}" method="post" class="d-inline">
                                <button type="submit" class="btn btn-sm btn-outline-danger">Eliminar</button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
