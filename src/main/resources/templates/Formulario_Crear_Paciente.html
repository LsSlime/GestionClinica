<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${paciente.id > 0 ? 'Editar Paciente' : 'Formulario Paciente'}">Formulario Paciente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <h1 class="h3 mb-4" th:text="${paciente.id > 0 ? 'Editar paciente' : 'Agregar paciente'}">Agregar paciente</h1>

                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                    <form th:action="${paciente.id > 0} ? @{/pacientes/actualizar} : @{/pacientes/guardar}" method="post">
                        <input type="hidden" name="id" th:value="${paciente.id}">

                        <div class="mb-3">
                            <label for="dni" class="form-label">DNI</label>
                            <input type="text" class="form-control" id="dni" name="dni" th:value="${paciente.dni}" th:readonly="${paciente.id > 0}" th:disabled="${paciente.id > 0}" required>
                            <div th:if="${paciente.id > 0}" class="form-text">El DNI no se puede modificar una vez creado el paciente.</div>
                        </div>
                        <div class="mb-3">
                            <label for="nombre" class="form-label">Nombre</label>
                            <input type="text" class="form-control" id="nombre" name="nombre" th:value="${paciente.nombre}" required>
                        </div>
                        <div class="mb-3">
                            <label for="apellido1" class="form-label">Primer apellido</label>
                            <input type="text" class="form-control" id="apellido1" name="apellido1" th:value="${paciente.apellido1}" required>
                        </div>
                        <div class="mb-3">
                            <label for="apellido2" class="form-label">Segundo apellido</label>
                            <input type="text" class="form-control" id="apellido2" name="apellido2" th:value="${paciente.apellido2}">
                        </div>
                        <div class="mb-3">
                            <label for="fechaNacimiento" class="form-label">Fecha de nacimiento</label>
                            <input type="date" class="form-control" id="fechaNacimiento" name="fechaNacimiento" th:value="${paciente.fechaNacimiento}" required>
                        </div>
                        <div class="mb-3">
                            <label for="genero" class="form-label">Genero</label>
                            <select class="form-select" id="genero" name="genero" th:disabled="${paciente.id > 0}" required>
                                <option value="">Seleccione...</option>
                                <option value="Masculino" th:selected="${paciente.genero == 'Masculino'}">Masculino</option>
                                <option value="Femenino" th:selected="${paciente.genero == 'Femenino'}">Femenino</option>
                            </select>
                            <div th:if="${paciente.id > 0}" class="form-text">El genero queda fijado en el alta del paciente.</div>
                        </div>
                        <div class="mb-3">
                            <label for="telefono" class="form-label">Telefono</label>
                            <input type="number" class="form-control" id="telefono" name="telefono" th:value="${paciente.telefono}" required>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">Correo electronico</label>
                            <input type="email" class="form-control" id="email" name="email" th:value="${paciente.email}" required>
                        </div>
                        <div class="mb-4">
                            <label for="direccion" class="form-label">Direccion</label>
                            <input type="text" class="form-control" id="direccion" name="direccion" th:value="${paciente.direccion}" required>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary" th:text="${paciente.id > 0 ? 'Actualizar' : 'Guardar'}">Guardar</button>
                            <a th:href="@{/pacientes}" class="btn btn-secondary">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
