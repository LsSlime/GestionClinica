<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Crear Medico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="h3 mb-1">Medicos</h1>
            <p class="text-secondary mb-0">Listado general de medicos registrados.</p>
        </div>
        <a th:href="@{/medicos/nuevo}" class="btn btn-primary">Nuevo medico</a>
    </div>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="card shadow-sm border-0">
        <div class="card-body">
            <div th:if="${#lists.isEmpty(medicos)}" class="alert alert-info mb-0">
                No hay medicos registrados todavia.
            </div>
            <div th:unless="${#lists.isEmpty(medicos)}" class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>DNI</th>
                        <th>Nombre</th>
                        <th>Telefono</th>
                        <th>Email</th>
                        <th>Especialidad</th>
                        <th>Número de colegiado</th>
                        <th class="text-end">Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="medico : ${medicos}">
                        <td th:text="${medico.id}">1</td>
                        <td th:text="${medico.dni}">00000000A</td>
                        <td th:text="${medico.nombre + ' ' + medico.apellido1 + (#strings.isEmpty(medico.apellido2) ? '' : ' ' + medico.apellido2)}">Nombre Apellidos</td>
                        <td th:text="${medico.telefono}">600000000</td>
                        <td th:text="${medico.email}">correo@ejemplo.com</td>
                        <td th:text="${medico.especialidad.nombre}">Especialidad</td>
                        <td th:text="${medico.numeroColegiado}">12345</td>
                        <td class="text-end">
                            <a href="/medicos" th:href="@{/medicos/editar/{id}(id=${medico.id})}" class="btn btn-sm btn-outline-primary">
                                Editar
                            </a>
                            <form th:action="@{/medicos/eliminar/{id}(id=${medico.id})}" method="post" class="d-inline">
                                <button type="submit" class="btn btn-sm btn-outline-danger">Eliminar</button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>

</html>
